{% extends "base.html" %}
{% block title %}Personal Details - TaxTrack Pro{% endblock %}
{% block content %}
<div class="container py-4">
  <h3 class="mb-3">Personal Details</h3>
  <form method="post" class="card card-body">
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Name</label><input class="form-control" name="name" value="{{ user.name or '' }}"></div>
      <div class="col-md-6"><label class="form-label">PAN</label><input class="form-control" value="{{ user.pan }}" disabled></div>
      <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" name="email" value="{{ user.email or '' }}"></div>
      <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" name="phone" value="{{ user.phone or '' }}"></div>
      <div class="col-md-6"><label class="form-label">DOB</label><input type="date" class="form-control" name="dob" value="{{ user.dob.isoformat() if user.dob else '' }}"></div>
      <div class="col-md-6"><label class="form-label">Gender</label><input class="form-control" name="gender" value="{{ user.gender or '' }}"></div>
      <div class="col-md-6"><label class="form-label">Residential Status</label><input class="form-control" name="residential_status" value="{{ user.residential_status or '' }}"></div>
      <div class="col-md-6"><label class="form-label">Days in India</label><input type="number" class="form-control" name="days_in_india" value="{{ user.days_in_india or '' }}"></div>
      <div class="col-md-12"><label class="form-label">Address line 1</label><input class="form-control" name="address_line1" value="{{ user.address_line1 or '' }}"></div>
      <div class="col-md-12"><label class="form-label">Address line 2</label><input class="form-control" name="address_line2" value="{{ user.address_line2 or '' }}"></div>
      <div class="col-md-4"><label class="form-label">City</label><input class="form-control" name="city" value="{{ user.city or '' }}"></div>
      <div class="col-md-4"><label class="form-label">State</label><input class="form-control" name="state" value="{{ user.state or '' }}"></div>
      <div class="col-md-4"><label class="form-label">Postal Code</label><input class="form-control" name="postal_code" value="{{ user.postal_code or '' }}"></div>
    </div>
    <div class="mt-3"><button class="btn btn-primary">Save</button></div>
  </form>
</div>
{% endblock %}
